$engine: 3
$onesync: on
name: Crown Framework
version: 0.1.0
author: OpenAI
description: txAdmin deployable starter for Crown Framework, built for serious british roleplay.

tasks:
  - action: download_github
    src: https://github.com/overextended/oxmysql
    ref: main
    dest: ./resources/[standalone]/oxmysql

  - action: move_path
    src: ./tmp/crown_framework/resources/[crown]
    dest: ./resources/[crown]

  - action: copy_path
    src: ./tmp/crown_framework/server.cfg
    dest: ./server.cfg

  - action: connect_database

  - action: query_database
    file: ./tmp/crown_framework/sql/crown_framework.sql
